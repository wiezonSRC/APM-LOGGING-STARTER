spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

log.trace.enabled=true
log.trace.sql-enabled=true
# 테스트 시에는 모든 로그가 찍히도록 TRACE 설정
log.trace.level=PROD
# 테스트를 위해 슬로우 쿼리 기준을 매우 낮춤 (필요시)
log.slow.query.ms=100
log.slow.query.total-ms=500

# SQL OOM 테스트를 위해 개수 제한을 낮게 설정 (테스트 용이성)
log.limit.max-sql-count=10
log.limit.max-sql-length=2000
log.limit.max-sql-param-length=1000
log.limit.max-body-length=20

server.port=0
spring.batch.job.enabled=false
